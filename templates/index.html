<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A&S Real Estate | Islamabad & Rawalpindi</title>
    
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #00ffcc;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1. Live Rates Marquee */
        .top-marquee {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 12px 0;
            font-weight: 600;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        /* 2. Glass Navbar */
        nav {
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        nav h1 {
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 3. Search & Filters Section */
        .filter-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-group {
            display: flex;
            gap: 10px;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* 4. Property Grid */
        .property-container {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 20px;
        }

        .property-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            position: relative;
        }

        .property-card:active {
            transform: scale(0.98);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-content {
            padding: 20px;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-map { background: rgba(0, 255, 204, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .btn-video { background: #1e293b; color: white; border: 1px solid var(--glass-border); }

        /* 5. Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.4);
            z-index: 1000;
            cursor: pointer;
        }

        /* 6. Footer */
        footer {
            text-align: center;
            padding: 50px 20px;
            font-size: 0.8rem;
            color: #64748b;
        }

        /* Responsive Desktop */
        @media (min-width: 768px) {
            .property-container {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                padding: 40px;
            }
            .filter-section {
                flex-direction: row;
                max-width: 1000px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="top-marquee">
        <marquee behavior="scroll" direction="left" scrollamount="6">
            <span>🔥 LIVE UPDATES: {{ rates }}</span> — Developed by Saqib Zaheer Satti (A&S Management Team)
        </marquee>
    </div>

    <nav>
        <h1>A&S Management</h1>
        <p style="font-size: 0.6rem; color: #94a3b8; letter-spacing: 2px;">REAL ESTATE & NAVIGATION SPECIALIST</p>
    </nav>

    <div class="filter-section">
        <div class="search-group">
            <select id="sectorSelect">
                <option value="all">All Sectors (Islamabad/Pindi)</option>
                <optgroup label="Islamabad">
                    <option value="G-6">G-6 (Aabpara)</option>
                    <option value="G-7">G-7 (Sectors)</option>
                    <option value="F-6">F-6 (Markaz)</option>
                    <option value="F-7">F-7 (Jinnah Super)</option>
                    <option value="F-8">F-8 (Kachehri)</option>
                    <option value="E-7">E-7 (Margalla)</option>
                    <option value="Gulberg">Gulberg Greens</option>
                    <option value="DHA">DHA Islamabad</option>
                </optgroup>
                <optgroup label="Rawalpindi">
                    <option value="Bahria">Bahria Town (All Phases)</option>
                    <option value="Saddar">Saddar Rawalpindi</option>
                    <option value="Adyala">Adyala Road</option>
                </optgroup>
            </select>
        </div>
        <input type="text" id="priceInput" placeholder="Max Price (e.g. 50,000)">
    </div>

    <div class="property-container" id="propertyList">
        <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
            <p style="opacity: 0.5;">Connecting to MongoDB Cloud Database...</p>
        </div>
    </div>

    <footer>
        <p>A&S Management & Solutions</p>
        <p>Managed by: Talha & Saqib Zaheer Satti</p>
        <p style="margin-top: 10px;">© 2026 Chikass Weather & Real Estate Integrated</p>
    </footer>

    <script>
        async function fetchProperties() {
            try {
                const response = await fetch('/get_properties');
                const properties = await response.json();
                renderProperties(properties);
            } catch (error) {
                console.error("Error loading properties:", error);
            }
        }

        function renderProperties(data) {
            const list = document.getElementById('propertyList');
            if (data.length === 0) {
                list.innerHTML = `<p style="text-align:center; grid-column:1/-1;">No properties found in this sector.</p>`;
                return;
            }

            list.innerHTML = data.map(p => `
                <div class="property-card">
                    <span class="badge">${p.type || 'For Sale'}</span>
                    <img src="${p.img || 'https://via.placeholder.com/400x250'}" class="card-img" alt="property">
                    <div class="card-content">
                        <div class="price-tag">PKR ${p.price}</div>
                        <div class="title">${p.title}</div>
                        <div class="details">
                            <span>📏 ${p.area || 'N/A'}</span>
                            <span>📍 ${p.area.split(',')[0]}</span>
                        </div>
                        <div class="btn-group">
                            <a href="${p.map}" target="_blank" class="btn btn-map">Google Map</a>
                            <a href="${p.video}" target="_blank" class="btn btn-video">Video Tour</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize App
        window.onload = fetchProperties;

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
